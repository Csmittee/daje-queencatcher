name: Daje Product Generator

on:
  push:
    paths:
      - 'products.csv'
      - 'scripts/generate_products.py'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate product pages
        run: |
          python scripts/generate_products.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.html th/*.html products.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate Daje product pages from CSV [skip ci]"
          git push
