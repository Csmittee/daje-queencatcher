<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daje Games · Happiness you can catch</title>
    
    <!-- META TAGS (customize later) -->
    <meta name="description" content="Welcome to our Gaming Center — claw machines and vending fun for everyone.">
    <meta property="og:title" content="Daje Games">
    <meta property="og:description" content="Happiness you can catch">
    <meta property="og:image" content="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773341421/Eng_SEO_OG.png">
    <meta property="og:url" content="https://daje.janishammer.com">
    
    <!-- JANISHAMMER FINAL INJECTORS (config first, then core) -->
    <script src="https://cdn.jsdelivr.net/gh/csmittee/janishammer-central/js/injector-config-v2.2.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/csmittee/janishammer-central/js/injector-core-v2.2.js"></script>
    
    <style>
        /* Hero section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 60vh;
            padding: 2rem;
        }
        
        /* Breathing logo animation */
        .hero-logo {
            max-width: 400px;
            width: 90%;
            margin-bottom: 2rem;
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Slide‑in header (ease power 1, 300ms) */
        .hero h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 4px 12px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
            animation: slideIn 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
        }
        
        /* Product cards placeholder (same as Flow) */
        .products-section {
            max-width: 1280px;
            margin: 4rem auto;
            padding: 2rem;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .product-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #000000, #FFB6C1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: #D4AF37;
        }
        
        .product-title {
            font-size: 1.5rem;
            color: #000000;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .product-desc {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 1.5rem;
        }
        
        .product-button {
            background: #000000;
            color: #FFB6C1;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .product-button:hover {
            background: #D4AF37;
            color: #000000;
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .section-title { font-size: 2rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- HERO SECTION (injector does NOT add this) -->
    <section class="hero">
        <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773931919/Daje-logo-original-nobg.png" 
             alt="Daje Games" 
             class="hero-logo">
        <h1>Welcome to our Gaming Center</h1>
        <!-- Optional subheading can go here -->
    </section>

    <!-- PRODUCTS SECTION (placeholder — replace later) -->
    <section class="products-section">
        <h2 class="section-title">Our Machines</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-icon">🦊</div>
                <h3 class="product-title">Queen Catcher</h3>
                <p class="product-desc">Premium claw machine · LED lights · Adjustable difficulty</p>
                <div class="product-price">฿45,000</div>
                <button class="product-button">Inquire</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🐼</div>
                <h3 class="product-title">Panda Mini</h3>
                <p class="product-desc">Compact size · Perfect for malls · 1m² footprint</p>
                <div class="product-price">฿29,000</div>
                <button class="product-button">Inquire</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🎁</div>
                <h3 class="product-title">Mystery Box</h3>
                <p class="product-desc">Vending machine with surprise prizes · Kids' favorite</p>
                <div class="product-price">฿18,000</div>
                <button class="product-button">Inquire</button>
            </div>
        </div>
    </section>
</body>
</html>
