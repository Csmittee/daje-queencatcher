<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daje Games · Happiness you can catch</title>
    
    <!-- META TAGS -->
    <meta name="description" content="Premium claw machines and vending machines — Daje Games">
    <meta property="og:title" content="Daje Games">
    <meta property="og:description" content="Happiness you can catch">
    <meta property="og:image" content="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773931919/Daje-logo-original-nobg.png">
    <meta property="og:url" content="https://daje.janishammer.com">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Quicksand for Daje -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- INJECTORS -->
    <script src="https://assets.janishammer.com/js/injector-core.js"></script>
    <script src="https://assets.janishammer.com/js/injector-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            position: relative;
        }
        
        /* Override injector dark overlay */
        body::before {
            display: none !important;
        }
        
        /* Daje brand colors - Light theme */
        :root {
            --daje-pink: #FFB6C1;
            --daje-gold: #D4AF37;
            --daje-dark: #333333;
            --daje-light: #ffffff;
            --daje-gray: #666666;
        }
        
        /* Floating Cart Button */
        .cart-floating {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #FFB6C1, #FF99AA);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.8);
        }
        
        .cart-floating:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }
        
        .cart-floating i {
            font-size: 1.5rem;
            color: #333;
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #D4AF37;
            color: #333;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 3rem 2rem 2rem;
            position: relative;
            z-index: 10;
            background: transparent;
        }
        
        .hero-logo {
            max-width: 360px;
            width: 100%;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        
        .hero-logo:hover {
            transform: scale(1.02);
        }
        
        .hero h1 {
            font-size: 2.5rem;
            color: #FFB6C1;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        
        .hero p {
            color: #D4AF37;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* Main Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem 3rem;
            position: relative;
            z-index: 10;
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .product-card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #f0f0f0;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            border-color: #FFB6C1;
        }
        
        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.4s ease;
            background: #fafafa;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.03);
        }
        
        .product-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        
        .product-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #D4AF37;
            margin: 0.5rem 0;
        }
        
        .product-price::before {
            content: "฿";
            font-size: 1.2rem;
        }
        
        .product-desc {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            flex: 1;
        }
        
        .stock-badge {
            display: inline-block;
            background: rgba(212,175,55,0.15);
            color: #D4AF37;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            align-self: flex-start;
        }
        
        .view-details {
            background: linear-gradient(135deg, #FFB6C1, #FF99AA);
            color: #333;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
            margin-top: auto;
            font-size: 0.9rem;
        }
        
        .view-details:hover {
            background: linear-gradient(135deg, #FF99AA, #FFB6C1);
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255,182,193,0.3);
        }
        
        /* Cart Modal Styles */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10001;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .cart-modal.active {
            display: flex;
        }
        
        .cart-content {
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .cart-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, #FFB6C1, #FF99AA);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h2 {
            color: #333;
            font-size: 1.3rem;
        }
        
        .cart-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: #333;
            font-weight: bold;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .cart-item-details {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 0.25rem;
        }
        
        .cart-item-price {
            color: #D4AF37;
            font-weight: 700;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .cart-qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            color: #333;
        }
        
        .cart-summary {
            padding: 1.5rem;
            background: #fafafa;
            border-top: 2px solid #f0f0f0;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #333;
        }
        
        .btn-quotation {
            width: 100%;
            background: linear-gradient(135deg, #FFB6C1, #FF99AA);
            color: #333;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-quotation:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,182,193,0.3);
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #D4AF37;
            color: #333;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 10002;
            transition: transform 0.3s;
            white-space: nowrap;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero-logo {
                max-width: 280px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .product-grid {
                grid-template-columns: 1fr;
            }
            .cart-floating {
                width: 50px;
                height: 50px;
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="cart-floating" id="cartFloating">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>
    
    <div class="hero">
        <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773931919/Daje-logo-original-nobg.png" class="hero-logo" alt="Daje Games">
        <h1>Happiness You Can Catch</h1>
        <p>Premium Claw Machines & Vending Equipment</p>
    </div>
    
    <div class="container">
        <div id="product-grid" class="product-grid"></div>
    </div>
    
    <!-- CART MODAL -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-bag"></i> Your Cart</h2>
                <span class="cart-close" onclick="closeCart()">&times;</span>
            </div>
            <div class="cart-items" id="cartItems">
                <div style="text-align: center; padding: 2rem; color: #888;">Your cart is empty</div>
            </div>
            <div class="cart-summary">
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cartTotal">฿0</span>
                </div>
                <button class="btn-quotation" onclick="requestQuotation()">
                    <i class="fas fa-file-invoice"></i> Get Your Quotation
                </button>
            </div>
        </div>
    </div>
    
    <!-- QUOTATION MODAL -->
    <div id="quotationModal" class="cart-modal">
        <div class="cart-content" style="max-width: 500px; text-align: center;">
            <div class="cart-header">
                <h2><i class="fas fa-check-circle"></i> Quotation Request</h2>
                <span class="cart-close" onclick="closeQuotationModal()">&times;</span>
            </div>
            <div style="padding: 2rem; text-align: center;">
                <i class="fas fa-envelope" style="font-size: 3rem; color: #D4AF37; margin-bottom: 1rem;"></i>
                <h3 style="color: #FFB6C1; margin-bottom: 0.5rem;">Thank You!</h3>
                <p style="color: #666; margin-bottom: 1rem;">We've received your quotation request.</p>
                <p style="color: #888; font-size: 0.9rem;">Our team will contact you within 24 hours.</p>
                <button class="btn-quotation" style="margin-top: 1.5rem;" onclick="closeQuotationModal()">
                    Continue Shopping
                </button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let cart = JSON.parse(localStorage.getItem('dajeCart')) || [];
        let products = [];
        
        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').innerText = count;
            localStorage.setItem('dajeCart', JSON.stringify(cart));
            renderCartItems();
        }
        
        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #888;">Your cart is empty</div>';
                if (totalSpan) totalSpan.innerText = '฿0';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" class="cart-item-image">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">฿${item.price.toLocaleString()}</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-qty-btn" onclick="updateCartItem(${idx}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateCartItem(${idx}, 1)">+</button>
                            <i class="fas fa-trash-alt" onclick="removeCartItem(${idx})" style="color: #F44336; cursor: pointer;"></i>
                        </div>
                    </div>
                `;
            }).join('');
            if (totalSpan) totalSpan.innerText = `฿${total.toLocaleString()}`;
        }
        
        function updateCartItem(index, change) {
            const newQty = cart[index].quantity + change;
            if (newQty <= 0) cart.splice(index, 1);
            else cart[index].quantity = newQty;
            updateCartUI();
        }
        
        function removeCartItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }
        
        function addToCart(product) {
            const existing = cart.find(i => i.id === product.id);
            if (existing) existing.quantity++;
            else cart.push({...product, quantity: 1});
            updateCartUI();
            showToast(`Added ${product.name} to cart`);
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function openCart() {
            document.getElementById('cartModal').classList.add('active');
            renderCartItems();
        }
        
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }
        
        function closeQuotationModal() {
            document.getElementById('quotationModal').classList.remove('active');
        }
        
        function requestQuotation() {
            if (cart.length === 0) {
                showToast('Please add items to your cart first');
                return;
            }
            closeCart();
            let items = cart.map(i => `${i.name} x ${i.quantity} = ฿${(i.price * i.quantity).toLocaleString()}`).join('\n');
            let total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            let subject = encodeURIComponent('Quotation Request - Daje Games');
            let body = encodeURIComponent(`Hello Daje Games Team,\n\nI would like a quotation for:\n\n${items}\n\nTotal: ฿${total.toLocaleString()}\n\nPlease contact me.\n\nBest regards`);
            window.location.href = `mailto:info@daje.janishammer.com?subject=${subject}&body=${body}`;
            document.getElementById('quotationModal').classList.add('active');
        }
        
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                products = await response.json();
                console.log(`Loaded ${products.length} Daje products`);
                renderProducts();
            } catch (error) {
                console.error('Failed to load products:', error);
                document.getElementById('product-grid').innerHTML = '<div style="text-align:center;padding:2rem;color:#FFB6C1;">Loading products...</div>';
            }
        }
        function slugify(name) {
            return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }
        
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            
            if (!products.length) {
                grid.innerHTML = '<div style="text-align:center;padding:2rem;color:#FFB6C1;">No products found</div>';
                return;
            }
            
        grid.innerHTML = products.map(p => `
            <div class="product-card" onclick="location.href='/${slugify(p.name)}.html'">        
                    <img src="${p.main_image}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <div class="stock-badge">${p.stock_status || 'In Stock'}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()}</div>
                        <p class="product-desc">${p.description ? p.description.substring(0, 80) : 'Premium quality machine'}</p>
                        <button class="view-details" onclick="event.stopPropagation(); addToCart({id:'${p.id}', name:'${p.name}', price:${p.price}, image:'${p.main_image}'})">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('cartFloating').addEventListener('click', openCart);
        
        loadProducts();
        updateCartUI();
    </script>
</body>
</html>
