<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daje Games · Happiness you can catch</title>
    
    <!-- META TAGS -->
    <meta name="description" content="Premium claw machines and vending machines — Daje Games">
    <meta property="og:title" content="Daje Games">
    <meta property="og:description" content="Happiness you can catch">
    <meta property="og:image" content="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773341421/Eng_SEO_OG.png">
    <meta property="og:url" content="https://daje.janishammer.com">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Quicksand for Daje -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- INJECTORS -->
    <script src="https://assets.janishammer.com/js/injector-core.js"></script>
    <script src="https://assets.janishammer.com/js/injector-config.js"></script>
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
        }
        
        .cart-floating {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #FFB6C1, #FF99AA);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .cart-floating:hover {
            transform: scale(1.1);
        }
        
        .cart-floating i {
            font-size: 1.5rem;
            color: #000;
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #D4AF37;
            color: #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .hero {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .hero-logo {
            max-width: 300px;
            margin-bottom: 2rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            color: #FFB6C1;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .filter-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
        }
        
        .cat-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .cat-btn.active, .cat-btn:hover {
            background: #FFB6C1;
            color: #000;
            border-color: #FFB6C1;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 0.5rem;
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #D4AF37;
        }
        
        .product-price::before {
            content: "฿";
        }
        
        .view-details {
            display: inline-block;
            background: #FFB6C1;
            color: #000;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        
        .view-details:hover {
            background: #D4AF37;
            transform: scale(1.05);
        }
        
        .stock-badge {
            display: inline-block;
            background: #D4AF37;
            color: #000;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .product-grid { grid-template-columns: 1fr; }
            .filter-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="cart-floating" id="cartFloating">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>
    
    <div class="hero">
        <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773931919/Daje-logo-original-nobg.png" class="hero-logo" alt="Daje Games">
        <h1>Welcome to Daje Games</h1>
        <p style="color: white; font-size: 1.2rem;">Premium claw machines · Vending · Happiness you can catch</p>
    </div>
    
    <div class="container">
        <div class="filter-section">
            <div class="filter-group">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="Claw Machine">🦊 Claw Machines</button>
                <button class="cat-btn" data-cat="Vending">🎁 Vending Machines</button>
                <button class="cat-btn" data-cat="Accessories">✨ Accessories</button>
            </div>
        </div>
        
        <div id="product-grid" class="product-grid"></div>
    </div>
    
    <!-- CART MODAL (same as Flow but with Daje colors) -->
    <div id="cartModal" class="cart-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; justify-content: center; align-items: center;">
        <div class="cart-content" style="max-width: 600px; width: 90%; max-height: 80vh; background: white; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column;">
            <div class="cart-header" style="padding: 1.5rem; background: linear-gradient(135deg, #FFB6C1, #FF99AA); display: flex; justify-content: space-between; align-items: center;">
                <h2 style="color: #000;"><i class="fas fa-shopping-bag"></i> Your Cart</h2>
                <span class="cart-close" onclick="closeCart()" style="font-size: 1.5rem; cursor: pointer;">&times;</span>
            </div>
            <div class="cart-items" id="cartItems" style="flex: 1; overflow-y: auto; padding: 1rem;"></div>
            <div class="cart-summary" style="padding: 1.5rem; background: #f8f9fa; border-top: 2px solid #e0e0e0;">
                <div class="cart-total" style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800;">
                    <span>Total</span>
                    <span id="cartTotal">฿0</span>
                </div>
                <button class="btn-quotation" onclick="requestQuotation()" style="width: 100%; background: linear-gradient(135deg, #FFB6C1, #FF99AA); color: #000; border: none; padding: 1rem; border-radius: 60px; font-weight: 800; margin-top: 1rem;">
                    <i class="fas fa-file-invoice"></i> Get Your Quotation
                </button>
            </div>
        </div>
    </div>
    
    <div id="quotationModal" class="cart-modal" style="display: none;">
        <div class="cart-content" style="max-width: 500px; width: 90%; background: white; border-radius: 32px; text-align: center; padding: 2rem;">
            <i class="fas fa-envelope" style="font-size: 3rem; color: #D4AF37;"></i>
            <h3 style="color: #000; margin: 1rem 0;">Thank You!</h3>
            <p>We've received your quotation request. Our team will contact you within 24 hours.</p>
            <button onclick="closeQuotationModal()" style="background: #FFB6C1; color: #000; border: none; padding: 0.8rem 2rem; border-radius: 40px; margin-top: 1rem;">Continue Shopping</button>
        </div>
    </div>
    
    <div id="toast" class="toast" style="position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #D4AF37; color: #000; padding: 0.8rem 1.5rem; border-radius: 60px; z-index: 10002; display: none;"></div>
    
    <script>
        let cart = JSON.parse(localStorage.getItem('dajeCart')) || [];
        let products = [];
        
        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').innerText = count;
            localStorage.setItem('dajeCart', JSON.stringify(cart));
            renderCartItems();
        }
        
        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem;">Your cart is empty</div>';
                if (totalSpan) totalSpan.innerText = '฿0';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item" style="display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid #eee;">
                        <img src="${item.image}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 12px;">
                        <div style="flex: 1;">
                            <div style="font-weight: 700;">${item.name}</div>
                            <div style="font-size: 0.8rem; color: #888;">${item.color || 'Default'}</div>
                            <div style="color: #D4AF37; font-weight: 700;">฿${item.price.toLocaleString()}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <button onclick="updateCartItem(${idx}, -1)" style="width: 28px; height: 28px; border-radius: 8px; background: #f0f0f0; border: none;">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartItem(${idx}, 1)" style="width: 28px; height: 28px; border-radius: 8px; background: #f0f0f0; border: none;">+</button>
                            <i class="fas fa-trash" onclick="removeCartItem(${idx})" style="color: #F44336; cursor: pointer;"></i>
                        </div>
                    </div>
                `;
            }).join('');
            if (totalSpan) totalSpan.innerText = `฿${total.toLocaleString()}`;
        }
        
        function updateCartItem(index, change) {
            const newQty = cart[index].quantity + change;
            if (newQty <= 0) cart.splice(index, 1);
            else cart[index].quantity = newQty;
            updateCartUI();
        }
        
        function removeCartItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }
        
        function addToCart(product) {
            const existing = cart.find(i => i.id === product.id);
            if (existing) existing.quantity++;
            else cart.push({...product, quantity: 1});
            updateCartUI();
            showToast(`Added ${product.name} to cart`);
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
        
        function openCart() {
            document.getElementById('cartModal').style.display = 'flex';
            renderCartItems();
        }
        
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }
        
        function closeQuotationModal() {
            document.getElementById('quotationModal').style.display = 'none';
        }
        
        function requestQuotation() {
            if (cart.length === 0) {
                showToast('Please add items to your cart first');
                return;
            }
            closeCart();
            document.getElementById('quotationModal').style.display = 'flex';
            let items = cart.map(i => `${i.name} x ${i.quantity} = ฿${(i.price * i.quantity).toLocaleString()}`).join('\n');
            let total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            let subject = encodeURIComponent('Quotation Request - Daje Games');
            let body = encodeURIComponent(`Hello Daje Games Team,\n\nI would like a quotation for:\n\n${items}\n\nTotal: ฿${total.toLocaleString()}\n\nPlease contact me.\n\nBest regards`);
            window.location.href = `mailto:info@daje.janishammer.com?subject=${subject}&body=${body}`;
        }
        
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                products = await response.json();
                renderProducts();
            } catch (error) {
                console.error('Failed to load products:', error);
            }
        }
        
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="location.href='/${p.id}.html'">
                    <img src="${p.main_image}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()}</div>
                        <div class="stock-badge">${p.stock_status}</div>
                        <button class="view-details" onclick="event.stopPropagation(); addToCart({id:'${p.id}', name:'${p.name}', price:${p.price}, image:'${p.main_image}'})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('cartFloating').addEventListener('click', openCart);
        
        // Category filter
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const cat = btn.dataset.cat;
                const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
                const grid = document.getElementById('product-grid');
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card" onclick="location.href='/${p.id}.html'">
                        <img src="${p.main_image}" class="product-image" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price.toLocaleString()}</div>
                            <div class="stock-badge">${p.stock_status}</div>
                            <button class="view-details" onclick="event.stopPropagation(); addToCart({id:'${p.id}', name:'${p.name}', price:${p.price}, image:'${p.main_image}'})">Add to Cart</button>
                        </div>
                    </div>
                `).join('');
            });
        });
        
        loadProducts();
        updateCartUI();
    </script>
</body>
</html>
